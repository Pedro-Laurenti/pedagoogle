name: Release

on:
  push:
    tags:
      - "v*"           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Sincroniza versão dos arquivos com a tag ─────────────────────────────
      - name: Bump version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "0,/^version = /s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          node -e "
            const fs = require('fs');
            ['src-tauri/tauri.conf.json', 'src/package.json'].forEach(f => {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            });
          "

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: src

      - name: Build frontend
        run: npm run build
        working-directory: src

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      # ── Linux system deps ───────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: src/node_modules/.bin/tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Pedagoogle ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
